<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Spacing Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h2 class="mb-4">Spacing Utilities Demo</h2>

    <div class="bg-primary text-white p-3 mb-3">
        Padding 3, Margin Bottom 3
    </div>

    <div class="bg-success text-white p-4 mb-4">
        Padding 4, Margin Bottom 4
    </div>

    <div class="bg-danger text-white p-5">
        Padding 5
    </div>

</body>
</html>
