<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Accordion Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2>Bootstrap Accordion Example</h2>

    <div class="accordion" id="demoAccordion">

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#section1">
                    Section 1
                </button>
            </h2>

            <div id="section1" class="accordion-collapse collapse show">
                <div class="accordion-body">
                    This is the content of Section 1.
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#section2">
                    Section 2
                </button>
            </h2>

            <div id="section2" class="accordion-collapse collapse">
                <div class="accordion-body">
                    This is the content of Section 2.
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
