<!DOCTYPE html>
<html>
<head>
    <title>Event Handling Demo</title>
</head>
<body>

    <h2>JavaScript Event Handling</h2>

    <button onclick="showMessage()">Click Me</button>

    <p id="output"></p>

    <script>
        function showMessage() {
            document.getElementById("output").innerHTML =
                "Button clicked successfully!";
        }
    </script>

</body>
</html>
