<!DOCTYPE html>
<html>
<head>
    <title>Objects and Prototypes Demo</title>
</head>
<body>

    <h2>JavaScript Objects and Prototypes</h2>

    <p id="output"></p>

    <script>
        function Student(name, age) {
            this.name = name;
            this.age = age;
        }

        Student.prototype.display = function () {
            return "Name: " + this.name + ", Age: " + this.age;
        };

        const student1 = new Student("Jaswanth", 21);

        document.getElementById("output").innerHTML =
            student1.display();
    </script>

</body>
</html>
